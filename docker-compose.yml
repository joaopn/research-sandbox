services:
  router:
    build: ./router
    container_name: rs-router
    networks:
      - rs-sandbox
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - rs-router-rules:/etc/sandbox/rules
    extra_hosts:
      # Lets the router resolve host.docker.internal so external MCPs
      # registered with `research mcp add --kind external` can be reached
      # from project subnets via per-project FORWARD ACCEPT rules.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  webui:
    # Optional browser UI; opt-in via `research webui start` (which does
    # `docker compose --profile webui up -d webui`). Lives on rs-sandbox
    # and is `docker network connect`'d to every rs-net-<project> by
    # `wire_webui_to_projects()` so it can SSH to each supervisor by
    # container DNS without going through the host's published port.
    profiles: ["webui"]
    build: ./webui
    image: rs-webui:latest
    container_name: rs-webui
    networks:
      - rs-sandbox
    ports:
      # WEBUI_PORT is the *host* port; container always listens on 7777
      # internally (matches EXPOSE in webui/Dockerfile). Only WEBUI_BIND
      # crosses the boundary because the TLS cert SAN needs to cover it.
      - "${WEBUI_BIND:-127.0.0.1}:${WEBUI_PORT:-7777}:7777"
    environment:
      - WEBUI_BIND=${WEBUI_BIND:-127.0.0.1}
      - RS_PROJECTS_ROOT=/projects
    volumes:
      - rs-webui-tls:/app/tls
      # RO read-side onto the same host directory `research project create`
      # writes to. Enables the rail's per-project status sub-line (worker
      # counts, disk, last activity) without granting docker socket access
      # or running a sidecar. Filesystem is the only data plane.
      - ${PROJECTS_DIR:-./container_volumes}:/projects:ro
    restart: unless-stopped


volumes:
  rs-router-rules:
  # Pin the literal volume name (no compose project-name prefix), so
  # `research webui cert-tailscale` and similar host-side helpers that
  # write into this volume by name agree with what rs-webui actually
  # mounts. Without `name:`, compose uses `<project>_rs-webui-tls`
  # which silently diverges from the helper's target.
  rs-webui-tls:
    name: rs-webui-tls

networks:
  # Shared infrastructure network: has internet via Docker gateway.
  # Per-project networks (rs-net-<name>) are created by research.py as
  # --internal and routed through rs-router.
  rs-sandbox:
    name: rs-sandbox
    driver: bridge

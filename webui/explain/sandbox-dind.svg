<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 420" role="img" aria-label="Sandbox-dind workflow orchestration">
  <style>
    .explain-doc svg .node rect { fill: #1f2933; stroke: #5b8def; stroke-width: 1.5; }
    .explain-doc svg .node text { fill: #e6edf3; font: 13px sans-serif; text-anchor: middle; dominant-baseline: middle; }
    .explain-doc svg .node:hover rect { fill: #2b3a4a; stroke: #8ab4ff; }
    .explain-doc svg .edge { stroke: #7a8794; stroke-width: 1.5; fill: none; marker-end: url(#rs-arrow); }
    .explain-doc svg .edge-label { fill: #9aa7b4; font: 11px sans-serif; text-anchor: middle; }
    .explain-doc svg a { cursor: pointer; }
  </style>
  <defs>
    <marker id="rs-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a8794"/>
    </marker>
  </defs>

  <line class="edge" x1="240" y1="66"  x2="240" y2="110"/>
  <line class="edge" x1="200" y1="162" x2="140" y2="220"/>
  <line class="edge" x1="280" y1="162" x2="340" y2="220"/>
  <line class="edge" x1="135" y1="268" x2="205" y2="330"/>
  <line class="edge" x1="345" y1="268" x2="275" y2="330"/>
  <text class="edge-label" x="240" y="306">egress</text>

  <a href="#what-it-is">
    <g class="node"><title>You — drive the management shell + rs-sandbox to create and tear down boxes yourself.</title>
      <rect x="160" y="22" width="160" height="44" rx="8"/>
      <text x="240" y="44">Operator</text></g>
  </a>
  <a href="#components">
    <g class="node"><title>rs-sandbox-dind: agent-less DIND host. Runs the inner Docker daemon + rs-inner bridge; you drive it via its shell + rs-sandbox.</title>
      <rect x="140" y="110" width="200" height="52" rx="8"/>
      <text x="240" y="136">Management host (dind)</text></g>
  </a>
  <a href="#components">
    <g class="node"><title>rs-pi-iso-&lt;name&gt; boxes you create/destroy via rs-sandbox; isolated from each other and the host; boot un-authed.</title>
      <rect x="60" y="220" width="150" height="48" rx="8"/>
      <text x="135" y="244">Isolated box</text></g>
  </a>
  <a href="#components">
    <g class="node"><title>rs-pi-iso-&lt;name&gt; boxes you create/destroy via rs-sandbox; isolated from each other and the host; boot un-authed.</title>
      <rect x="270" y="220" width="150" height="48" rx="8"/>
      <text x="345" y="244">Isolated box</text></g>
  </a>
  <a href="#components">
    <g class="node"><title>The project's egress filter — locked by default — for every box.</title>
      <rect x="160" y="330" width="160" height="44" rx="8"/>
      <text x="240" y="352">rs-router</text></g>
  </a>
</svg>

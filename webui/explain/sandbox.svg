<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" role="img" aria-label="Sandbox workflow orchestration">
  <style>
    .explain-doc svg .node rect { fill: #1f2933; stroke: #5b8def; stroke-width: 1.5; }
    .explain-doc svg .node text { fill: #e6edf3; font: 13px sans-serif; text-anchor: middle; dominant-baseline: middle; }
    .explain-doc svg .node:hover rect { fill: #2b3a4a; stroke: #8ab4ff; }
    .explain-doc svg .edge { stroke: #7a8794; stroke-width: 1.5; fill: none; marker-end: url(#rs-arrow); }
    .explain-doc svg .edge-label { fill: #9aa7b4; font: 11px sans-serif; text-anchor: middle; }
    .explain-doc svg a { cursor: pointer; }
  </style>
  <defs>
    <marker id="rs-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a8794"/>
    </marker>
  </defs>

  <line class="edge" x1="200" y1="66"  x2="200" y2="120"/>
  <line class="edge" x1="200" y1="176" x2="200" y2="250"/>
  <text class="edge-label" x="200" y="216">locked egress</text>

  <a href="#what-it-is">
    <g class="node"><title>You — open the box's Shell (or Editor) tab and work directly.</title>
      <rect x="120" y="22" width="160" height="44" rx="8"/>
      <text x="200" y="44">Researcher</text></g>
  </a>
  <a href="#components">
    <g class="node"><title>One rs-minimal runc container: ssh + byobu, optional editor / agent CLI. No inner Docker — it cannot spawn containers.</title>
      <rect x="110" y="120" width="180" height="56" rx="8"/>
      <text x="200" y="148">Sandbox box (runc)</text></g>
  </a>
  <a href="#components">
    <g class="node"><title>The project's egress filter — locked by default (80/443/53 + ICMP, RFC1918 blocked). The real confinement.</title>
      <rect x="120" y="250" width="160" height="44" rx="8"/>
      <text x="200" y="272">rs-router</text></g>
  </a>
</svg>
